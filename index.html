<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Jean d'Arc — Sublimez vos Lectures</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1E3A5F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/jpeg" href="/logo_pwa_gold.jpg" />
    <link rel="apple-touch-icon" href="/logo_pwa_gold.jpg" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #1E3A5F; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #1E3A5F; color: #D4AF37;
        font-family: Georgia, 'Times New Roman', serif;
        transition: opacity 0.6s ease-out;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash .logo { font-size: 72px; margin-bottom: 16px; animation: pulse 2s ease-in-out infinite; }
      #splash h1 {
        font-size: 28px; font-weight: 800; letter-spacing: 6px;
        text-transform: uppercase; color: #D4AF37; margin-bottom: 8px;
      }
      #splash p { font-size: 12px; color: rgba(212,175,55,0.6); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }
      #splash .bar-track {
        width: 200px; height: 3px; background: rgba(212,175,55,0.15);
        border-radius: 4px; overflow: hidden;
      }
      #splash .bar-fill {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #D4AF37, #F0D68A, #D4AF37);
        background-size: 200% 100%;
        animation: load 1.8s ease-in-out forwards, shimmer 1s ease-in-out infinite;
        border-radius: 4px;
      }
      @keyframes load { 0% { width: 0%; } 70% { width: 75%; } 100% { width: 85%; } }
      @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
      @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.85; } }
    </style>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('PWA Service Worker registered successfully:', reg.scope))
            .catch((err) => console.warn('PWA Service Worker registration failed:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash">
      <div class="logo">⚜️</div>
      <h1>Jean d'Arc</h1>
      <p>Sublimez vos Lectures</p>
      <div class="bar-track">
        <div class="bar-fill"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
